<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>APEX DAD</title>
<style>
/* Fonts load from CDN when online */
</style>
<style>
:root {
  --bg:#070809;--s1:#0d1014;--s2:#131820;--s3:#1a2230;
  --border:#1e2d3a;--borderhi:#2a4050;
  --text:#eaf0f8;--muted:#4a6070;--dim:#151f28;
  --canyon:#e05a1a;--canyonL:#ff7535;--canyonD:#7a2e08;
  --gold:#c89020;--goldL:#f0b030;
  --sage:#2a8050;--sageL:#3ab868;
  --sky:#1a6ab8;--skyL:#3a98ee;
  --violet:#5a3a98;--violetL:#8858e0;
  --red:#c03030;--redL:#e05050;
  --green:#20a050;--greenL:#35d068;
  --yellow:#c8a020;--yellowL:#f0c030;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;position:relative;}

/* MOTIVATIONAL OVERLAY */
#moto-overlay{position:fixed;inset:0;background:rgba(7,8,9,0.97);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center;}
#moto-date{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:9px;letter-spacing:0.3em;color:var(--canyonD);margin-bottom:20px;text-transform:uppercase;}
#moto-icon{font-size:48px;margin-bottom:20px;animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
#moto-quote{font-family:'Bebas Neue','Arial Narrow','Impact',sans-serif,'Arial Narrow','Impact',sans-serif;font-size:28px;letter-spacing:0.04em;line-height:1.2;color:var(--text);margin-bottom:16px;}
#moto-quote span{color:var(--canyon);}
#moto-sub{font-size:13px;color:var(--muted);line-height:1.6;max-width:300px;margin-bottom:28px;}
#moto-for{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:10px;color:var(--muted);letter-spacing:0.15em;margin-bottom:28px;}
#moto-btn{background:var(--canyon);border:none;border-radius:10px;padding:14px 40px;font-family:'Bebas Neue','Arial Narrow','Impact',sans-serif,'Arial Narrow','Impact',sans-serif;font-size:20px;letter-spacing:0.1em;color:#fff;cursor:pointer;width:100%;max-width:300px;}

/* NOTIFICATION BANNER */
#notif-bar{background:linear-gradient(90deg,var(--canyonD),#1a1010);border-bottom:1px solid var(--canyon)40;padding:8px 16px;display:none;align-items:center;gap:10px;flex-shrink:0;}
#notif-text{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:10px;color:var(--canyonL);flex:1;}
#notif-dismiss{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 4px;}

/* HEADER */
#header{background:linear-gradient(180deg,#0a1520 0%,var(--bg) 100%);padding:48px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
#header-top{display:flex;justify-content:space-between;align-items:flex-start;}
#brand-name{font-family:'Bebas Neue','Arial Narrow','Impact',sans-serif,'Arial Narrow','Impact',sans-serif;font-size:30px;letter-spacing:0.08em;color:var(--text);line-height:1;}
#brand-name span{color:var(--canyon);}
#brand-sub{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;letter-spacing:0.25em;color:var(--canyonD);margin-top:1px;}
#race-counter{text-align:right;}
#days-num{font-family:'Bebas Neue','Arial Narrow','Impact',sans-serif,'Arial Narrow','Impact',sans-serif;font-size:34px;color:var(--canyon);line-height:1;}
#days-lbl{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:var(--muted);letter-spacing:0.12em;}
#prog-bar{margin-top:10px;height:2px;background:var(--s3);border-radius:2px;overflow:hidden;}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--canyon));border-radius:2px;transition:width 0.5s;}
#prog-labels{display:flex;justify-content:space-between;margin-top:3px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:var(--muted);}

/* CONTENT + NAV */
#content{flex:1;overflow-y:auto;padding:14px 16px 8px;-webkit-overflow-scrolling:touch;}
#content::-webkit-scrollbar{display:none;}
#nav{background:var(--s1);border-top:1px solid var(--border);display:flex;padding:8px 0 18px;flex-shrink:0;position:relative;z-index:5;}
.nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;}
.ni{font-size:20px;line-height:1.2;transition:color 0.15s;}
.nl{font-size:8px;letter-spacing:0.08em;text-transform:uppercase;transition:color 0.15s;font-style:normal;}
.nb.active .ni,.nb.active .nl{color:var(--canyon);}
.nb:not(.active) .ni,.nb:not(.active) .nl{color:var(--muted);}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:11px;}
.cb{padding:12px 15px;}
.slabel{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:9px;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;margin-bottom:11px;}

/* SESSION CARD */
.sc{border-radius:11px;overflow:hidden;margin-bottom:11px;}
.sh{padding:13px 15px;}
.stag{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;letter-spacing:0.18em;margin-bottom:2px;}
.stitle{font-family:'Bebas Neue','Arial Narrow','Impact',sans-serif,'Arial Narrow','Impact',sans-serif;font-size:24px;letter-spacing:0.04em;line-height:1;}
.ssub{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px;}
.rbadge{margin-top:7px;padding:5px 9px;border-radius:5px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:10px;display:inline-block;}
.cbtn{margin-top:9px;width:100%;border:none;border-radius:7px;padding:9px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:11px;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;}

/* ACCORDION */
.abtn{width:100%;background:none;border:none;border-bottom:1px solid var(--border);padding:9px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.15s;}
.acont{border-bottom:1px solid var(--border);}
.exrow{display:grid;grid-template-columns:1fr 38px 58px 1fr;gap:5px;padding:8px 15px;border-bottom:1px solid var(--dim);align-items:start;}
.exn{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;}
.exs{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:12px;}
.exr{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:10px;color:var(--goldL);}
.exnote{font-size:10px;color:var(--muted);font-style:italic;line-height:1.4;}
.wurow{padding:5px 15px;border-bottom:1px solid var(--dim);font-size:11px;display:flex;gap:9px;}
.wunum{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:9px;color:var(--muted);min-width:15px;}
.exhdr{display:grid;grid-template-columns:1fr 38px 58px 1fr;gap:5px;padding:6px 15px 3px;border-bottom:1px solid var(--dim);}
.exhdr span{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:var(--muted);letter-spacing:0.12em;}

/* STATS */
.srow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:11px;}
.sc2{background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:9px 7px;text-align:center;}
.slb{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:7px;color:var(--muted);letter-spacing:0.08em;margin-bottom:2px;}
.sv{font-family:'Bebas Neue','Arial Narrow','Impact',sans-serif,'Arial Narrow','Impact',sans-serif;font-size:19px;line-height:1;}
.su{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:7px;color:var(--muted);margin-top:1px;}

/* WEEK ADJ */
.wadj{background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:9px 13px;display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.wadjb{background:var(--s2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:5px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);}
.wadjc{flex:1;text-align:center;}
.wadjw{font-family:'Bebas Neue','Arial Narrow','Impact',sans-serif,'Arial Narrow','Impact',sans-serif;font-size:20px;color:var(--canyon);line-height:1;}
.wadjp{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;margin-top:1px;}

/* WEEK ROWS */
.drow{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:11px;cursor:pointer;}
.dico{font-size:19px;width:24px;text-align:center;}
.dnm{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:1px;}
.dlb{font-size:11px;color:var(--muted);}
.ddi{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:9px;color:var(--sageL);margin-top:1px;}
.dtag{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:7px;padding:2px 6px;border-radius:3px;}
.badge{font-size:7px;padding:1px 5px;border-radius:7px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;}

/* FORMS */
.ltabs{display:flex;gap:5px;margin-bottom:13px;flex-wrap:wrap;}
.ltab{flex:1;border:none;border-radius:5px;padding:7px 3px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.fg{margin-bottom:9px;}
.fl{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;margin-bottom:3px;}
.fi{background:var(--s2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 9px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:12px;outline:none;width:100%;}
.fi:focus{border-color:var(--borderhi);}
.fta{background:var(--s2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 9px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:12px;outline:none;width:100%;resize:none;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.rrow{display:flex;gap:4px;}
.rbtn{flex:1;border:none;border-radius:4px;padding:6px 0;font-size:11px;cursor:pointer;transition:all 0.15s;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;}
.sbtn{width:100%;border:none;border-radius:7px;padding:11px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;margin-top:3px;}
.toast{background:rgba(32,160,80,0.18);border:1px solid var(--green);border-radius:7px;padding:7px 13px;text-align:center;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:10px;color:var(--greenL);margin-bottom:11px;}

/* CHARTS */
.cc{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:13px;margin-bottom:11px;}
.ctitle{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:9px;letter-spacing:0.13em;margin-bottom:9px;}
.csvg{width:100%;}
.cfooter{display:flex;justify-content:space-between;margin-top:4px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:var(--muted);}
.pgbar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:5px;}
.pgfill{height:100%;border-radius:3px;transition:width 0.5s;}

/* BLOOD */
.mrow{padding:8px 0;border-bottom:1px solid var(--dim);}
.mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.mnm{font-size:12px;font-weight:600;}
.mright{display:flex;gap:5px;align-items:center;}
.mval{font-family:'Bebas Neue','Arial Narrow','Impact',sans-serif,'Arial Narrow','Impact',sans-serif;font-size:17px;line-height:1;}
.mtgt{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:9px;padding:2px 7px;border-radius:3px;}
.mwhy{font-size:11px;color:var(--muted);}
.tdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.bwtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;}
.bwtab{border:none;border-radius:4px;padding:4px 9px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;}
.bwmi{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:9px 11px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:9px;}
.bwin{background:var(--bg);border:1px solid var(--borderhi);border-radius:4px;color:var(--text);padding:5px 7px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:13px;width:75px;text-align:center;outline:none;}

/* INJECTION TRACKER */
.inj-card{background:var(--s1);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:11px;}
.inj-header{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.inj-row{padding:10px 15px;border-bottom:1px solid var(--dim);display:flex;align-items:center;justify-content:space-between;}
.inj-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--borderhi);background:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.inj-check.done{background:var(--canyon);border-color:var(--canyon);}

/* NUTRITION */
.mc{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;}
.mh{padding:9px 13px;display:flex;align-items:center;gap:9px;}
.memo{font-size:17px;}
.mt{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;letter-spacing:0.12em;margin-bottom:1px;}
.mn2{font-size:13px;font-weight:700;}
.mb{padding:7px 13px;}
.mi{font-size:11px;padding:3px 0;border-bottom:1px solid var(--dim);display:flex;gap:6px;}

/* PHOTOS */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px;}
.pitem{border-radius:7px;overflow:hidden;border:1px solid var(--border);}
.pimg{width:100%;height:125px;object-fit:cover;display:block;}
.pcap{padding:5px 7px;background:var(--s2);}
.pwk{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:9px;color:var(--skyL);}
.pnt{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:var(--muted);margin-top:1px;}

/* TRAVEL */
.stabs{display:flex;gap:5px;margin-bottom:13px;}
.stab{flex:1;border:none;border-radius:6px;padding:7px 3px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:7px;font-weight:700;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;}
.rrow2{padding:7px 0;border-bottom:1px solid var(--dim);}
.rt{font-size:12px;font-weight:700;margin-bottom:2px;}
.rd{font-size:11px;color:var(--muted);line-height:1.5;}

/* RECOVERY */
.rcday{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;}
.rcdh{padding:9px 13px;display:flex;justify-content:space-between;align-items:center;}
.rcitem{padding:7px 13px;border-top:1px solid var(--dim);}
.rcp{font-size:12px;font-weight:600;margin-bottom:2px;}
.rcn{font-size:10px;color:var(--muted);line-height:1.5;}

/* PROGRAM */
.ptab-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;}
.ptab{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:5px;padding:6px 3px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.ptab.active{background:var(--canyon);border-color:var(--canyon);color:#fff;}
.phcard{border-radius:9px;overflow:hidden;margin-bottom:9px;}
.phhdr{padding:13px 15px;}
.phnum{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:9px;letter-spacing:0.18em;margin-bottom:2px;}
.phname{font-family:'Bebas Neue','Arial Narrow','Impact',sans-serif,'Arial Narrow','Impact',sans-serif;font-size:21px;letter-spacing:0.04em;}
.phdesc{font-size:11px;margin-top:2px;opacity:0.7;}
.phbody{background:var(--s1);padding:11px 15px;}
.runrow{display:grid;grid-template-columns:76px 125px 1fr;gap:9px;padding:8px 0;border-bottom:1px solid var(--dim);align-items:start;}
.rwk{font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:10px;font-weight:700;}
.rsess{font-size:12px;font-weight:700;}
.rdet{font-size:11px;color:var(--muted);line-height:1.5;}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.screen{animation:fadeIn 0.18s ease;}
.uarea{border:2px dashed var(--borderhi);border-radius:9px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:11px;}
</style>
</head>
<body>
<div id="app">

<!-- MOTIVATIONAL OVERLAY -->
<div id="moto-overlay">
  <div id="moto-date"></div>
  <div id="moto-icon">🔥</div>
  <div id="moto-quote"></div>
  <div id="moto-sub"></div>
  <div id="moto-for">For <span style="color:var(--canyon);">your daughter</span> · <span style="color:var(--canyon);">your wife</span> · <span style="color:var(--canyon);">yourself</span></div>
  <button id="moto-btn" onclick="dismissMoto()">LETS GO →</button>
</div>

<!-- NOTIFICATION BANNER -->
<div id="notif-bar">
  <span id="notif-text"></span>
  <button id="notif-dismiss" onclick="dismissNotif()">✕</button>
</div>

<!-- HEADER -->
<div id="header">
  <div id="header-top">
    <div>
      <div id="brand-name">APEX<span>DAD</span></div>
      <div id="brand-sub">Ultimate Human · Est. 2026</div>
    </div>
    <div id="race-counter">
      <div id="days-lbl">RACE IN</div>
      <div id="days-num">--</div>
      <div id="days-lbl">DAYS</div>
    </div>
  </div>
  <div id="prog-bar"><div id="prog-fill"></div></div>
  <div id="prog-labels"><span>WK 1</span><span id="week-phase">--</span><span>RACE</span></div>
</div>

<div id="content"></div>

<div id="nav">
  <button class="nb active" data-screen="today" onclick="sw('today')"><span class="ni">🏠</span><span class="nl">Today</span></button>
  <button class="nb" data-screen="week" onclick="sw('week')"><span class="ni">📅</span><span class="nl">Week</span></button>
  <button class="nb" data-screen="log" onclick="sw('log')"><span class="ni">➕</span><span class="nl">Log</span></button>
  <button class="nb" data-screen="progress" onclick="sw('progress')"><span class="ni">📈</span><span class="nl">Progress</span></button>
  <button class="nb" data-screen="program" onclick="sw('program')"><span class="ni">⚡</span><span class="nl">Program</span></button>
</div>
</div>

<script>

// Every 6 weeks from program start
function getNextBloodworkDate() {
  const lastBW = load('lastBloodwork', null);
  if (!lastBW) {
    // First one: recommend before Week 1
    return '2026-06-05';
  }
  const last = new Date(lastBW);
  const next = new Date(last);
  next.setDate(next.getDate() + 42); // 6 weeks
  return next.toISOString().split('T')[0];
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function daysOut(){return Math.max(0,Math.ceil((RACE_DATE-new Date())/86400000));}
function getWk(d){return Math.max(1,Math.min(36,Math.ceil((d-PROGRAM_START)/604800000)));}
function getPhase(w){return PHASES.find(p=>w>=p.weeks[0]&&w<=p.weeks[1])||PHASES[0];}
function getTodayDow(){return new Date().getDay();}
function getTodayTpl(){return WT.find(t=>t.dow===getTodayDow())||WT[0];}
function getRunDist(w,day){
  if(day==='Tuesday'){
    if(w<=2)return'20 min walk/run FLAT';if(w<=4)return'25 min walk/run FLAT';
    if(w<=6)return'25–30 min @ 2%';if(w<=8)return'30–35 min @ 2–3%';
    if(w<=11)return'3 mi @ 3%';if(w<=14)return'3–4 mi @ 3%';
    if(w<=17)return'4–5 mi @ 3%';if(w<=20)return'4–5 mi @ 3–4%';
    if(w<=24)return'5–6 mi @ 4%';if(w<=28)return'5–6 mi @ 4%';
    if(w<=30)return'4–5 mi @ 4%';if(w<=32)return'4 mi @ 3%';
    if(w<=33)return'3 mi easy';if(w<=34)return'2–3 mi easy';
    if(w<=35)return'2 mi + 6 strides';return'2 mi Mon · REST · RACE SUN 7AM';
  }
  if(day==='Saturday'){
    if(w<=2)return'20 min flat';if(w<=4)return'25 min flat';
    if(w<=6)return'30 min @ 2%';if(w<=8)return'35 min @ 2–3% · KidRunner intro';
    if(w<=11)return'4 mi @ 3% + KidRunner';if(w<=14)return'5 mi @ 3% + KidRunner';
    if(w<=17)return'6–7 mi @ 3–4% + KidRunner';if(w<=20)return'8–9 mi @ 3–4%';
    if(w<=24)return'8–10 mi @ 4% + KidRunner';if(w<=28)return'10–11 mi @ 4% PEAK';
    if(w<=30)return'9–10 mi @ 4%';if(w<=32)return'7–8 mi taper';
    if(w<=33)return'6 mi @ 3%';if(w<=34)return'4–5 mi easy';
    if(w<=35)return'3 mi + 6 strides';return'🏁 RACE DAY — Feb 27 · 7:00am MT';
  }
  if(day==='Thursday')return w>=9?'Tempo: 20–30 min @ 4–5% HR 155–165':'No tempo yet — starts Wk 9';
  return'';
}
function mStatus(m,val){
  if(!val)return'none';
  const v=parseFloat(val);if(isNaN(v))return'none';
  if(m.dir==='lo') return v<=m.hi?'green':v<=m.hi*1.3?'yellow':'red';
  if(m.dir==='hi') return v>=m.lo?'green':v>=m.lo*0.8?'yellow':'red';
  if(m.dir==='range') return(v>=m.lo&&v<=m.hi)?'green':(v>=m.lo*0.85&&v<=m.hi*1.2)?'yellow':'red';
  return'none';
}
function sColor(s){
  if(s==='green')return'#35d068';
  if(s==='yellow')return'#f0c030';
  if(s==='red')return'#e05050';
  return'#4a6070';
}
function miniC(data,color,h=60){
  if(!data||data.length<2)return`<div style="height:${h}px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:10px;color:#4a6070">Log more data to see trend</div>`;
  const vals=data.map(d=>d.v);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=300,H=h;
  const xs=W/(data.length-1);
  const ys=v=>H-((v-mn)/rng)*H*0.85-H*0.05;
  const pts=data.map((d,i)=>`${i*xs},${ys(d.v)}`).join(' ');
  const area=`0,${H} ${pts} ${(data.length-1)*xs},${H}`;
  const cid=color.replace('#','');
  return`<svg viewBox="0 0 ${W} ${H}" class="csvg" style="height:${h}px">
    <defs><linearGradient id="g${cid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
    </linearGradient></defs>
    <polygon points="${area}" fill="url(#g${cid})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${data.map((d,i)=>`<circle cx="${i*xs}" cy="${ys(d.v)}" r="3" fill="${color}"/>`).join('')}
  </svg>`;
}

function getDailyMoto(){
  const day=new Date().toDateString();
  const lastDay=ld('motoDay','');
  if(lastDay===day)return null; // Already shown today
  const raw=Math.floor(Math.abs((new Date()-new Date('2026-06-06'))/86400000));
  const idx=raw%MOTO.length;
  return MOTO[idx]||MOTO[0];
}
function showMoto(){
  const m=getDailyMoto();
  if(!m){document.getElementById('moto-overlay').style.display='none';checkNotifs();return;}
  const now=new Date();
  document.getElementById('moto-date').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase()+' · WK '+S.week;
  document.getElementById('moto-icon').textContent=m.icon;
  document.getElementById('moto-quote').innerHTML=m.quote;
  document.getElementById('moto-sub').textContent=m.sub;
  document.getElementById('moto-overlay').style.display='flex';
}
function dismissMoto(){
  sv('motoDay',new Date().toDateString());
  document.getElementById('moto-overlay').style.display='none';
  checkNotifs();
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
function checkNotifs(){
  const now=new Date();
  const dow=now.getDay();
  const msgs=[];

  // Injection reminder — Monday (1) and Thursday (4)
  if(INJECTION_DAYS.includes(dow)){
    const injKey='inj_'+now.toDateString();
    if(!ld(injKey,false)){
      msgs.push({text:'💉 INJECTION DAY — TRT 0.5ml + HCG 0.25 IU · Log after done',key:injKey});
    }
  }

  // Bloodwork reminder
  const nextBW=getNextBloodworkDate();
  const nextBWDate=new Date(nextBW);
  const daysUntilBW=Math.ceil((nextBWDate-now)/86400000);
  if(daysUntilBW<=3&&daysUntilBW>=0){
    const bwKey='bwremind_'+nextBW;
    if(!ld(bwKey,false)){
      msgs.push({text:`🩸 BLOODWORK DUE ${daysUntilBW===0?'TODAY':daysUntilBW===1?'TOMORROW':'IN '+daysUntilBW+' DAYS'} — LabCorp · Upload results to Claude`,key:bwKey});
    }
  }

  if(msgs.length>0){
    const bar=document.getElementById('notif-bar');
    document.getElementById('notif-text').textContent=msgs[0].text;
    bar.style.display='flex';
    bar.dataset.key=msgs[0].key;
  }
}
function dismissNotif(){
  const bar=document.getElementById('notif-bar');
  if(bar.dataset.key)sv(bar.dataset.key,true);
  bar.style.display='none';
}

  TRAVEL_SC.forEach(sc=>{
    const a=S.tsc===sc.id;
    h+=`<button class="stab" onclick="setTSC('${sc.id}')" style="background:${a?sc.color:'var(--s1)'};border:1px solid ${a?sc.color:'var(--border)'};color:${a?'#000':'var(--muted)'};">
      ${sc.name}<br><span style="font-weight:400;font-size:7px;">${sc.title}</span></button>`;
  });
  h+=`</div>`;

  const sc=TRAVEL_SC.find(s=>s.id===S.tsc);
  h+=`<div style="padding:9px 12px;background:${sc.color}12;border:1px solid ${sc.color}40;border-radius:7px;margin-bottom:9px;">
    <div style="font-size:12px;font-weight:700;color:${sc.color};margin-bottom:2px;">${sc.title}</div>
    <div style="font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:9px;color:var(--muted);">📍 ${sc.indicator}</div>
  </div>`;

  h+=`<div style="display:flex;gap:5px;margin-bottom:9px;">`;
  ['sessions','notes','food'].forEach(t=>{
    const a=S.tsub===t;
    h+=`<button onclick="setTSub('${t}')" style="flex:1;background:${a?sc.color:'var(--s1)'};border:1px solid ${a?sc.color:'var(--border)'};border-radius:5px;padding:6px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:${a?'#000':'var(--muted)'};cursor:pointer;text-transform:uppercase;">${t}</button>`;
  });
  h+=`</div>`;

  if(S.tsub==='sessions'){
    sc.sessions.forEach(sess=>{
      h+=`<div class="card" style="margin-bottom:9px;">
        <div style="padding:9px 13px;background:${sess.color}12;border-bottom:1px solid ${sess.color}25;">
          <div style="font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:${sess.color};margin-bottom:1px;">${sess.day.toUpperCase()}</div>
          <div style="font-size:13px;font-weight:700;">${sess.label}</div>
        </div>
        <div class="exhdr"><span>EXERCISE</span><span>SETS</span><span>REPS</span><span>NOTE</span></div>`;
      sess.exercises.forEach(ex=>h+=`<div class="exrow"><span class="exn">${ex.ex}</span><span class="exs" style="color:${sess.color};">${ex.sets}</span><span class="exr">${ex.reps}</span><span class="exnote">${ex.note}</span></div>`);
      if(sess.cardio)h+=`<div style="padding:7px 13px;background:${C.sage}10;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:10px;color:${C.sageL};">🏃 ${sess.cardio}</div>`;
      h+=`</div>`;
    });
  }
  if(S.tsub==='notes'){
    h+=`<div class="card"><div class="cb">`;
    sc.notes.forEach(n=>h+=`<div style="display:flex;gap:7px;padding:6px 0;border-bottom:1px solid var(--dim);font-size:12px;"><span style="color:${sc.color};">→</span>${n}</div>`);
    h+=`</div></div>`;
    h+=`<div class="card"><div class="cb"><div class="slabel" style="color:var(--skyL);">✈ FLIGHT RULES</div>`;
    [{r:'16 oz water/hr minimum',d:'Cabin dehydrates — compounds TRT hematocrit risk.'},
     {r:'No alcohol on flights',d:'One drink = 2 days of recovery lost.'},
     {r:'Aisle seat — stand every 60 min',d:'DVT risk on TRT with elevated hematocrit.'},
     {r:'Electrolytes before boarding',d:'LMNT or Redmond Real Salt.'},
     {r:'Walk the airport always',d:'Skip walkways. Take stairs. Every connection.'},
    ].forEach(r=>h+=`<div class="rrow2"><div class="rt">${r.r}</div><div class="rd">${r.d}</div></div>`);
    h+=`</div></div>`;
  }
  if(S.tsub==='food'){
    h+=`<div class="card"><div class="cb"><div class="slabel" style="color:var(--goldL);">🥩 EATING ON THE ROAD</div>`;
    [{r:'Steakhouses everywhere',d:'Ribeye, butter, no sauce. Any airport, any city.'},
     {r:'Airport: sit-down over fast food',d:'Most terminals have a steak or salmon option.'},
     {r:'Grocery store option',d:'Hard boiled eggs, deli beef, canned salmon, berries.'},
     {r:'Sardines in carry-on',d:'3.75 oz cans pass TSA. Bring 2–3 cans.'},
     {r:'Client dinner order',d:'"Steak medium rare, no sauce, mixed greens." Done.'},
     {r:'Fast food emergency',d:'Chipotle: steak, no rice/beans, guac. Burger: no bun.'},
    ].forEach(r=>h+=`<div class="rrow2"><div class="rt">${r.r}</div><div class="rd">${r.d}</div></div>`);
    h+=`</div></div>`;
  }
  return h;
}

function rRecovery(){
  const tabs=[{id:'schedule',l:'Schedule'},{id:'sauna',l:'Sauna/Cold'},{id:'sleep',l:'Sleep'},{id:'blood',l:'Markers'}];
  let h=`<div style="display:flex;gap:5px;margin-bottom:11px;">`;
  tabs.forEach(t=>{
    const a=S.recTab===t.id;
    h+=`<button onclick="setRT('${t.id}')" style="flex:1;background:${a?'var(--sky)':'var(--s1)'};border:1px solid ${a?'var(--sky)':'var(--border)'};border-radius:5px;padding:6px 2px;font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:${a?'#fff':'var(--muted)'};cursor:pointer;">${t.l}</button>`;
  });
  h+=`</div>`;

  if(S.recTab==='schedule'){
    RECOVERY_SCH.forEach(day=>{
      h+=`<div class="rcday">
        <div class="rcdh" style="background:${day.color}12;">
          <span style="font-size:12px;font-weight:700;color:${day.color};">${day.day}</span>
          <span style="font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:var(--muted);">${day.training}</span>
        </div>`;
      day.items.forEach(item=>h+=`<div class="rcitem">
        <div style="font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:7px;color:${day.color};letter-spacing:0.1em;margin-bottom:2px;">${item.lbl.toUpperCase()}</div>
        <div class="rcp">${item.p}</div>
        <div class="rcn">${item.n}</div>
      </div>`);
      h+=`</div>`;
    });
    h+=`<div style="padding:9px 13px;background:rgba(192,48,48,0.1);border:1px solid rgba(192,48,48,0.3);border-radius:7px;font-size:11px;color:var(--redL);">⚠ HEMATOCRIT: 16–20oz electrolytes BEFORE every sauna. 16oz AFTER. Always.</div>`;
  }

  if(S.recTab==='sauna'){
    [[`Strength days`,'Sauna 15–20 → Cold 2–3 min → Sauna 10','Sauna FIRST on lift days — preserves anabolic window.'],
     ['Run days','Cold 2–3 min → Sauna 15–20','Cold first reduces leg inflammation.'],
     ['Double days (Thu)','Sauna 15 → Cold 2 min','Shorter — system already stressed.'],
     ['Long run (Sat)','Cold ONLY — 3–5 min','No sauna after long runs.'],
     ['Race week','Sauna only — no cold','Want legs alive at start line.'],
    ].forEach(([l,seq,why])=>h+=`<div class="card" style="margin-bottom:7px;"><div class="cb">
      <div style="font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;color:var(--sky);margin-bottom:3px;">${l.toUpperCase()}</div>
      <div style="font-size:13px;font-weight:700;margin-bottom:3px;">${seq}</div>
      <div style="font-size:11px;color:var(--muted);">${why}</div>
    </div></div>`);
    h+=`<div style="padding:9px 13px;background:rgba(26,106,184,0.1);border:1px solid rgba(26,106,184,0.3);border-radius:7px;font-size:11px;color:var(--skyL);margin-top:4px;">
      Sauna post-training elevates GH 2–5×. Cold plunge elevates it independently. You stack both daily. On TRT this is elite-level body recomposition stimulus.
    </div>`;
  }

  if(S.recTab==='sleep'){
    [['8–9 hrs every training night','GH released in deep sleep. Every adaptation converts here.'],
     ['5:30am wake — same time 7 days','Variable wake = disrupted cortisol = disrupted testosterone.'],
     ['No screens 60 min pre-bed','Blue light suppresses melatonin. You wake at 5:30.'],
     ['Room temp 65–68°F','Core temp must drop to initiate deep sleep.'],
     ['Morning sun within 30 min of waking','Sets melatonin release 14–16 hrs later. Free. 5 minutes.'],
     ['Magnesium glycinate 400mg pre-bed','Activates GABA. Drops cortisol. Best sleep supplement.'],
    ].forEach(([r,d])=>h+=`<div class="card" style="margin-bottom:7px;"><div class="cb">
      <div style="font-size:13px;font-weight:700;margin-bottom:3px;">${r}</div>
      <div style="font-size:11px;color:var(--muted);line-height:1.6;">${d}</div>
    </div></div>`);
  }

  if(S.recTab==='blood'){
    h+=`<div style="padding:9px 12px;background:rgba(192,48,48,0.1);border:1px solid rgba(192,48,48,0.3);border-radius:7px;margin-bottom:11px;font-size:11px;color:var(--redL);">
      Given your father at 57 — these markers are cardiac protection. Test every 6 weeks. Upload screenshots to Claude for full analysis.
    </div>`;
    BLOOD_MARKERS.forEach(m=>{
      h+=`<div class="mrow">
        <div class="mtop"><div style="font-size:12px;font-weight:600;">${m.name}</div>
          <div class="mright"><div class="mtgt" style="background:rgba(32,160,80,0.15);color:var(--greenL);">${m.target}</div>
            <div style="font-family:'DM Mono','SF Mono','Menlo','Courier New',monospace,'SF Mono','Menlo','Courier New',monospace;font-size:8px;background:var(--s2);color:var(--muted);padding:2px 6px;border-radius:3px;">${m.freq}</div>
          </div>
        </div>
        <div class="mwhy">${m.why}</div>
      </div>`;
    });
  }
  return h;
}

// ─── EVENTS + SAVES ──────────────────────────────────────────────────────────
function bindAll(){
  // Complete btn
  const cb=document.getElementById('cbtn');
  if(cb)cb.addEventListener('click',()=>{
    const vd=S.selDay||getTodayTpl();
    const k=S.week+'-'+vd.day;
    S.completed[k]=!S.completed[k];
    sv('completed',S.completed);render();
  });
  // Week adj
  const wm=document.getElementById('wk-m');
  const wp=document.getElementById('wk-p');
  if(wm)wm.addEventListener('click',()=>{S.week=Math.max(1,S.week-1);sv('week',S.week);render();});
  if(wp)wp.addEventListener('click',()=>{S.week=Math.min(36,S.week+1);sv('week',S.week);render();});
  // Accordions
  ['wu','cool','b0','b1','b2','b3'].forEach(k=>{
    const el=document.getElementById('acc-'+k);
    if(el)el.addEventListener('click',()=>{S.exp[k]=!S.exp[k];render();});
  });
  // Save buttons
  const sr=document.getElementById('save-run');if(sr)sr.addEventListener('click',saveRun);
  const sg=document.getElementById('save-gym');if(sg)sg.addEventListener('click',saveGym);
  const sw=document.getElementById('save-wt');if(sw)sw.addEventListener('click',saveWt);
  const sb=document.getElementById('save-blood');if(sb)sb.addEventListener('click',saveBlood);
  const sp=document.getElementById('save-photo');if(sp)sp.addEventListener('click',savePhoto);
}

function flash(){S.saved=true;setTimeout(()=>{S.saved=false;render();},2000);}

function saveRun(){
  const f=S.rf;
  f.date=document.getElementById('rf-d')?.value||f.date;
  f.dist=document.getElementById('rf-dist')?.value||'';
  f.dur=document.getElementById('rf-dur')?.value||'';
  f.pace=document.getElementById('rf-pace')?.value||'';
  f.ahr=document.getElementById('rf-ahr')?.value||'';
  f.mhr=document.getElementById('rf-mhr')?.value||'';
  f.inc=document.getElementById('rf-inc')?.value||'';
  f.stroller=document.getElementById('rf-str')?.checked||false;
  f.notes=document.getElementById('rf-notes')?.value||'';
  const e={...f,id:Date.now(),week:S.week};
  S.runLogs.unshift(e);sv('runLogs',S.runLogs);
  S.rf={date:td(),dist:'',dur:'',ahr:'',mhr:'',pace:'',inc:'',stroller:false,ankle:'3',effort:'3',notes:''};
  flash();
}
function saveGym(){
  const f=S.gf;
  f.date=document.getElementById('gf-d')?.value||f.date;
  f.session=document.getElementById('gf-sess')?.value||f.session;
  f.ahr=document.getElementById('gf-ahr')?.value||'';
  f.mhr=document.getElementById('gf-mhr')?.value||'';
  f.dur=document.getElementById('gf-dur')?.value||'';
  f.notes=document.getElementById('gf-notes')?.value||'';
  const e={...f,id:Date.now(),week:S.week};
  S.gymLogs.unshift(e);sv('gymLogs',S.gymLogs);
  S.gf={date:td(),session:'Push + Core',ahr:'',mhr:'',dur:'',energy:'3',notes:''};
  flash();
}
function saveWt(){
  const f=S.wf;
  f.date=document.getElementById('wf-d')?.value||f.date;
  f.weight=document.getElementById('wf-w')?.value||'';
  f.waist=document.getElementById('wf-ws')?.value||'';
  f.notes=document.getElementById('wf-notes')?.value||'';
  if(!f.weight&&!f.waist)return;
  const e={...f,id:Date.now(),week:S.week};
  S.weightLogs.unshift(e);
  S.weightLogs.sort((a,b)=>new Date(a.date)-new Date(b.date));
  sv('weightLogs',S.weightLogs);
  S.wf={date:td(),weight:'',waist:'',notes:''};
  flash();
}
function saveBlood(){
  const date=document.getElementById('bf-d')?.value||td();
  const e={...S.bf,date,id:Date.now(),week:S.week};
  S.bloodLogs.unshift(e);sv('bloodLogs',S.bloodLogs);
  sv('lastBloodwork',date);
  S.bf={};flash();
}
function savePhoto(){
  const f=S.pf;
  f.week=document.getElementById('pf-wk')?.value||f.week;
  f.notes=document.getElementById('pf-notes')?.value||'';
  if(!f.src)return;
  const e={...f,id:Date.now()};
  S.photos.unshift(e);sv('photos',S.photos);
  S.pf={week:String(S.week),notes:'',src:''};
  flash();
}
function handlePh(event){
  const file=event.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{S.pf.src=e.target.result;render();};
  r.readAsDataURL(file);
}

// ─── GLOBAL HANDLERS ─────────────────────────────────────────────────────────
function sw(s){S.screen=s;S.selDay=null;S.exp={};render();}
function selDay(dow){S.selDay=WT.find(t=>t.dow===dow)||null;S.exp={};S.screen='today';render();}
function setLT(t){S.logTab=t;render();}
function setBSub(t){S.bloodSub=t;render();}
function setBV(name,val){S.bf[name]=val;}
function setR(k,v){S.rf[k]=v;render();}
function setGE(v){S.gf.energy=v;render();}
function setPT(t){S.ptab=t;render();}
function setTSC(id){S.tsc=id;S.tsub='sessions';render();}
function setTSub(t){S.tsub=t;render();}
function setRT(t){S.recTab=t;render();}
function triggerPhotoUpload(){var el=document.getElementById("pf-file");if(el)el.click();}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initStorage();
S.week=Math.max(1,Math.min(36,ld('week',getWk(new Date()))));
render();
showMoto();
</script>
